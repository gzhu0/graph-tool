<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.min.js"></script>
    <style> 
        
        /*Cytoscape Style */
        #cy {
        width: 70vw;
        height: 70vh;
        display: block;
        border: solid;
        border-width: 3px;
        border-color: black;
        }
        .edgeBox {
            width:25%;
            height:10vh;
        }
        .cutItem {
            width: 30vh;
            font-size: 1.5rem;
            border: 2px black;
        }

    </style>
</head>
<body>
    <div id="cy">  </div>

    <div id="menu-bar">
        <button id="nodeButton" class = "button"> Vertex </button>
        <button id="edgeButton" class = "button"> Edge </button>
        <button id="deleteButton" class = "button"> Delete </button>
        <button id="debugButton" class = "button"> Debug </button>
        <textarea id="edgeBox" placeholder="Ex: [[1,2],[3,4]...]"></textarea>
        <button id="createGraphButton"> Create Graph </button>

        <input type="text" id="kInput" placeholder="Input k..." />
        <button id="kCutsButton">Find Edges</button>
        
        <div id="cutsContainer"></div>
    </div>
    

    <script>
        // draw_mode can be node, edge, or erase
        let drawMode = "node";
        let selectedNode = null;
        let priorityInserts = []; // Stores removed node ids that have reinsert priority

        // Helper Functions
        function insertInOrder(list, x) { 
            // Inserts in order into a list
            for (let i = 0; i < list.length; i++) {
                if (x < list[i]) {
                    list.splice(i,0,x);
                    return;
                }
                break;
            }
            list.push(x);
        }

        function clearSelectedNode() {
            // Clears selected node and removes styling
            selectedNode = null;
        }

        function jsonToEdgeList() {
            // Converts cytoscape json into an edge list for api calling
            let output = [];
            let data = cy.json();
            let edges = data.elements.edges
            if (edges) {
                for (let edge of edges) {
                    let s = parseInt(edge.data.source);
                    let t = parseInt(edge.data.target);
                    output.push([s,t]);
                }
        }
            return output
        }

        function highlightCut(partitions) {     
            // Given 2 partition of nodes, highlights them in different colors
        A = partitions[0]
        B = partitions[1]
        console.log("Highlighting partitions:");
        console.log(A);
        console.log(B);
        for (let nodeId of A) {
            console.log(nodeId);
            cy.getElementById(nodeId).addClass('redNode');
        }
        for (let nodeId of B) {
            cy.getElementById(nodeId).addClass('blueNode');
            console.log(cy.getElementById(nodeId))
        }
        
        }

        function cleanGraph() {
            // Removes classes from every node
            cy.nodes().removeClass('redNode blueNode');
            
        }

        function updateEdgeOutput() {
            // Outputs the list of edges in the graph
            edges = JSON.stringify(jsonToEdgeList())
            edgeBox.value = edges;
        }
    
        // Button Elements
        const nodeButton = document.getElementById("nodeButton");
        const edgeButton = document.getElementById("edgeButton");
        const deleteButton = document.getElementById("deleteButton");
        const debugButton = document.getElementById("debugButton");
        const edgeBox = document.getElementById("edgeBox");
        const createGraphButton = document.getElementById("createGraphButton");

        const kInput = document.getElementById("kInput");
        const kCutsButton = document.getElementById("kCutsButton");
        const cutsContainer = document.getElementById("cutsContainer");

        // Event Handlers
        nodeButton.addEventListener("click", function() {
            drawMode = "node";
            clearSelectedNode();
        });
        edgeButton.addEventListener("click", function() {
            drawMode = "edge";
        });
        deleteButton.addEventListener("click", function() {
            drawMode = "delete";
            clearSelectedNode();
        });
        debugButton.addEventListener("click", function() {
            out = ""
            console.log("Draw Mode: ", drawMode)
            console.log("Nodes:");
            for (let node of cy.nodes()) {
                out += node.data('id') + " ";
            }
            console.log(out);
            console.log(cy.nodes());
            out = "";
            console.log("Edges:");
            for (let edge of cy.edges()) {
                out += edge.data('id') + " ";
            }
            console.log(out)
            console.log(cy.edges());
            if (selectedNode == null) console.log("selectedNode: Null");
            else console.log("selectedNode:", selectedNode.data('id'));
            console.log("Insert Queue", priorityInserts)
            console.log("Json File:")
            console.log(cy.json());
            console.log("Edge List:")
            console.log(jsonToEdgeList());
            console.log('Clearing graph')
            cleanGraph();
        });
        createGraphButton.addEventListener("click", function() {
            edges = JSON.parse(edgeBox.value);
            console.log("Creating a graph with", edges)
            cy.elements().remove();

            let nodes = new Set();

            edges.forEach(([u,v]) => {
                if (!nodes.has(u)) {
                    cy.add({group: 'nodes', data: {id: u}});
                }
                if (!nodes.has(v)) {
                    cy.add({group: 'nodes', data: {id: v}});
                }
                cy.add({group:'edges', data: {source: u, target: v}});
            }
            
        )
            const layout = cy.layout({ name: 'cose' });
            layout.on('layoutstop', function() {
                cy.zoom(cy.zoom() * 0.7);
                cy.center();
            });
            layout.run();
        });

        // Create Cuts Container
        function createCutContainer(k_cuts) {
            cutsContainer.innerHTML = "";

            // Check if no cuts
            if (k_cuts.length == 0) {
                const item = document.createElement('div');
                console.log("No Cuts Found")
                item.innerText = "No cuts found."
                cutsContainer.appendChild(item);
            }

            k_cuts.forEach((cut, index) => {

                text = "";
                cut.forEach(partition => {
                    console.log("displaying partition", partition)
                    text += "(" + partition.join(", ") + ") ";
                });

                const item = document.createElement('div');
                item.className = 'cutItem';
                item.innerText = "Cut" + (index + 1) + ":" + text;

                item.addEventListener('mouseenter', () => {
                    console.log("Hovering over cut", item.innerText);
                    highlightCut(cut);
                });

                item.addEventListener('mouseleave', () => {
                    cleanGraph();
                });

                cutsContainer.appendChild(item);
            });
        }

        // Find k-Cuts Button
        kCutsButton.addEventListener("click", async () => {
            let k = kInput.value;
            try {
                const response = await fetch("/algorithm-kcut", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        data: jsonToEdgeList(),
                        k: parseInt(k) 
                    })
                });

                k_cuts = await response.json();
                console.log("Response:", k_cuts);
                // Create cut container
                createCutContainer(k_cuts);

            } catch (err) {
                console.error("Error:", err);
            }
        });        

        // Create cytoscape instance
        var cy = cytoscape({
            container: document.getElementById('cy'),
            style: [ 
                {
                selector: 'node', style: {
                    'background-color': '#667',
                    'label': 'data(id)'
                }
                },
                {
                selector: 'edge',
                style: {
                    'width': 3,
                    'line-color': '#ccc',
                    'target-arrow-color': '#ccc',
                    'target-arrow-shape': 'none',
                    'curve-style': 'bezier'
                }
                },
                {
                    selector: '.blueNode',
                    style: {
                        'background-color': 'blue',
                        'border-width': 2,
                        'border-color': 'black'
                    }
                },
                {
                    selector: '.redNode',
                    style: {
                        'background-color': 'red',
                        'border-width': 2,
                        'border-color': 'black'
                    }
                },
            ],
            layout: {
                name: 'grid',
                rows: 1
            }
        });

        // Handling User Input
        cy.on('tap', function(event)
        {
            
            if (drawMode == "node"){
                if (priorityInserts.length > 0) {
                    nodeId = priorityInserts.shift();
                } else {
                    nodeId = cy.nodes().length+1;
                }
                cy.add({
                    group: 'nodes',
                    data: { id : nodeId },
                    position: event.position
                })
                console.log("created node", cy.nodes().length);
            }

            else if (drawMode == 'edge'){
                // Connect selected node with tapped node. If no tapped node, then select -> tapped
                if (event.target != null && event.target != cy && event.target.isNode()) {
                if (selectedNode == null) {
                    selectedNode = event.target;
                    console.log("selected node", selectedNode.id());
                } else {
                    // Standardizing edges so its min to max id
                    source = Math.min(selectedNode.id(),event.target.id());
                    target = Math.max(selectedNode.id(),event.target.id());

                    // Edge ids are in the form source,sink
                    edgeId = source.toString() + "," + target.toString();
                    if (cy.getElementById(edgeId).length > 0) {
                        console.log("edge", edgeId, "exists");
                        selectedNode = null
                    }
                    else {
                        console.log("creating edge", edgeId);
                        cy.add({
                            group: 'edges',
                            data: {id : edgeId, source: source, target: target}
                        });
                    }
                    selectedNode = null

                }
                }
            }

            else if (drawMode == "delete") {
                if (event.target != null && event.target != cy && (event.target.isNode() || event.target.isEdge())) {
                    console.log("Removing ", event.target.data('id'));
                    removedID = event.target.data('id');
                    cy.remove(event.target);
                    console.log('removed node', removedID);
                    if (event.target.isNode()) {
                        insertInOrder(priorityInserts, removedID);
                        console.log('current removed list: ', priorityInserts);
                    }
                }
            }
            updateEdgeOutput();
         });


        // Hotkeys
        addEventListener("keydown", (event) => {})
        onkeydown = (event) => {
            if (event.key == '1') {
                console.log('1 pressed, switching draw mode to node');
                drawMode="node";
            clearSelectedNode();
            } else if (event.key == '2') {
                console.log('2 pressed, switching draw mode to edge');
                drawMode="edge";
            clearSelectedNode();
            } else if (event.key == '3') {
                console.log('3 pressed, switching draw mode to delete');
                drawMode="delete";
            clearSelectedNode();
            } 
        }

    // TASKS
    // Styling / Restructure HTML for scalability
    // Highlight Nodes & Buttons
    // Option Bar: Multigraph
    // Find K-Edge Connected Components

    // TASK: APPROXIMATE CONGESTION ALGORITHM
        // https://drops.dagstuhl.de/storage/00lipics/lipics-vol327-stacs2025/LIPIcs.STACS.2025.63/LIPIcs.STACS.2025.63.pdf

    // TASK: OPTION BAR
        // Multigraph Option


    // Add multigraph option?
    </script>
</body>
</html>
